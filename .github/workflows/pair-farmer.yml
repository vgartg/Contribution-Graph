name: Pair Extraordinaire Farmer

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of co-authored PRs to create'
        required: false
        default: '9'

permissions:
  contents: write
  pull-requests: write

jobs:
  farm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create co-authored PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COUNT: ${{ inputs.count }}
        run: |
          git config user.email "vgartg@gmail.com"
          git config user.name "vgartg"

          CO_AUTHOR="Co-authored-by: tirexxic <285292197+tirexxic@users.noreply.github.com>"

          for i in $(seq 1 "$COUNT"); do
            BRANCH="pair/batch-$(date +%Y%m%d)-${i}-${RANDOM}"
            git checkout -b "$BRANCH"

            echo "$(date -u +%Y-%m-%dT%H:%M:%S) [pair-${i}]" >> .log
            git add .log

            MSG="$(printf 'chore: routine update #%s\n\n%s' "$i" "$CO_AUTHOR")"
            git commit -m "$MSG"

            git push origin "$BRANCH"

            gh pr create \
              --title "Routine update #${i}" \
              --body "" \
              --base main \
              --head "$BRANCH"

            gh pr merge --squash --delete-branch

            git checkout main
            git pull origin main

            sleep 2
          done

          echo "## Pair Extraordinaire Farmer" >> "$GITHUB_STEP_SUMMARY"
          echo "Created and merged **${COUNT}** co-authored PRs." >> "$GITHUB_STEP_SUMMARY"
