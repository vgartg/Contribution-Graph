name: Daily Activity

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Random activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "vgartg@gmail.com"
          git config user.name "vgartg"

          MESSAGES=(
            "chore: update"
            "chore: minor fix"
            "chore: cleanup"
            "chore: refactor"
            "chore: improve"
            "chore: adjust"
            "chore: tweak"
            "chore: housekeeping"
          )

          PR_TITLES=(
            "Minor improvements"
            "Small fixes"
            "Cleanup"
            "Maintenance"
            "Routine update"
          )

          make_commits() {
            local N=$1
            for i in $(seq 1 $N); do
              echo "$(date -u +%Y-%m-%dT%H:%M:%S) [$RANDOM]" >> .log
              git add .log
              local MSG="${MESSAGES[$((RANDOM % ${#MESSAGES[@]}))]}"
              git commit -m "$MSG"
            done
          }

          # 25% — no activity; 75% split equally across 1..7 commits
          SKIP=$((RANDOM % 4))
          RESULT_TYPE=""
          RESULT_DETAIL=""
          N=0

          if [ $SKIP -eq 0 ]; then
            RESULT_TYPE="none"
            RESULT_DETAIL="No activity today"
          else
            N=$((RANDOM % 7 + 1))
            ROLL=$((RANDOM % 10))

            if [ $ROLL -le 3 ]; then
              RESULT_TYPE="pr"
              BRANCH="update/$(date +%Y%m%d)-$RANDOM"
              git checkout -b "$BRANCH"
              make_commits $N
              git push origin "$BRANCH"
              TITLE="${PR_TITLES[$((RANDOM % ${#PR_TITLES[@]}))]}"
              PR_URL=$(gh pr create --title "$TITLE" --body "" --base main --head "$BRANCH")
              gh pr merge --squash --delete-branch "$PR_URL"
              RESULT_DETAIL="PR «$TITLE» — $N commit(s), squash merged"
            else
              RESULT_TYPE="commits"
              make_commits $N
              git push
              RESULT_DETAIL="$N direct commit(s) to main"
            fi
          fi

          # Job summary
          {
            echo "## Daily Activity — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Skip roll | $SKIP / 3 (0 = skip) |"
            echo "| Commits | $N |"
            if [ "$RESULT_TYPE" = "none" ]; then
              echo "| Result | ⬜ No activity |"
            elif [ "$RESULT_TYPE" = "pr" ]; then
              echo "| Result | 🔀 PR flow |"
              echo "| Detail | $RESULT_DETAIL |"
            else
              echo "| Result | 🟩 Direct commits |"
              echo "| Detail | $RESULT_DETAIL |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
