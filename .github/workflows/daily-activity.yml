name: Daily Activity

on:
  schedule:
    - cron: '0 9 * * *'   # 12:00 по Москве
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Random activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "vgartg@gmail.com"
          git config user.name "vgartg"

          MESSAGES=(
            "chore: update"
            "chore: minor fix"
            "chore: cleanup"
            "chore: refactor"
            "chore: improve"
            "chore: adjust"
            "chore: tweak"
            "chore: housekeeping"
          )

          PR_TITLES=(
            "Minor improvements"
            "Small fixes"
            "Cleanup"
            "Maintenance"
            "Routine update"
          )

          # 0-1 (20%) — ничего
          # 2-4 (30%) — ветка + PR + мерж
          # 5-9 (50%) — прямые коммиты в main
          ROLL=$((RANDOM % 10))

          make_commits() {
            local N=$1
            for i in $(seq 1 $N); do
              echo "$(date -u +%Y-%m-%dT%H:%M:%S) [$RANDOM]" >> .log
              git add .log
              local MSG="${MESSAGES[$((RANDOM % ${#MESSAGES[@]}))]}"
              git commit -m "$MSG"
            done
          }

          if [ $ROLL -le 1 ]; then
            echo "Today: no activity"

          elif [ $ROLL -le 4 ]; then
            echo "Today: PR flow"
            BRANCH="update/$(date +%Y%m%d)-$RANDOM"
            git checkout -b "$BRANCH"

            N=$((RANDOM % 3 + 1))
            make_commits $N
            git push origin "$BRANCH"

            TITLE="${PR_TITLES[$((RANDOM % ${#PR_TITLES[@]}))]}"
            gh pr create --title "$TITLE" --body "" --base main --head "$BRANCH"
            gh pr merge --squash --delete-branch --yes

          else
            echo "Today: direct commits"
            N=$((RANDOM % 7 + 1))
            make_commits $N
            git push
          fi
