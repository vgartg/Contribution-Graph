name: Daily Activity

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Random activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "vgartg@gmail.com"
          git config user.name "vgartg"

          MESSAGES=(
            "chore: update"
            "chore: minor fix"
            "chore: cleanup"
            "chore: refactor"
            "chore: improve"
            "chore: adjust"
            "chore: tweak"
            "chore: housekeeping"
          )

          PR_TITLES=(
            "Minor improvements"
            "Small fixes"
            "Cleanup"
            "Maintenance"
            "Routine update"
          )

          ROLL=$((RANDOM % 10))

          make_commits() {
            local N=$1
            for i in $(seq 1 $N); do
              echo "$(date -u +%Y-%m-%dT%H:%M:%S) [$RANDOM]" >> .log
              git add .log
              local MSG="${MESSAGES[$((RANDOM % ${#MESSAGES[@]}))]}"
              git commit -m "$MSG"
            done
          }

          RESULT_TYPE=""
          RESULT_DETAIL=""

          if [ $ROLL -le 1 ]; then
            RESULT_TYPE="none"
            RESULT_DETAIL="No activity today"

          elif [ $ROLL -le 4 ]; then
            RESULT_TYPE="pr"
            BRANCH="update/$(date +%Y%m%d)-$RANDOM"
            git checkout -b "$BRANCH"
            N=$((RANDOM % 3 + 1))
            make_commits $N
            git push origin "$BRANCH"
            TITLE="${PR_TITLES[$((RANDOM % ${#PR_TITLES[@]}))]}"
            gh pr create --title "$TITLE" --body "" --base main --head "$BRANCH"
            gh pr merge --squash --delete-branch --yes
            RESULT_DETAIL="PR «$TITLE» — $N commit(s), squash merged"

          else
            RESULT_TYPE="commits"
            N=$((RANDOM % 7 + 1))
            make_commits $N
            git push
            RESULT_DETAIL="$N direct commit(s) to main"
          fi

          # Job summary
          {
            echo "## Daily Activity — $(date -u +%Y-%m-%d)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Roll | $ROLL / 9 |"
            if [ "$RESULT_TYPE" = "none" ]; then
              echo "| Result | ⬜ No activity |"
            elif [ "$RESULT_TYPE" = "pr" ]; then
              echo "| Result | 🔀 PR flow |"
              echo "| Detail | $RESULT_DETAIL |"
            else
              echo "| Result | 🟩 Direct commits |"
              echo "| Detail | $RESULT_DETAIL |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
